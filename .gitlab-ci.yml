stages:
  - validate
  - security
  - integration

variables:
  FLUX_VERSION: "2.8.1"
  GITLEAKS_VERSION: "8.24.0"

# ---------------------------------------------------------------------------
# Stage: validate
# ---------------------------------------------------------------------------

validate-manifests:
  stage: validate
  image: node:22-alpine
  before_script:
    - apk add --no-cache curl bash
    - |
      curl -sL "https://github.com/fluxcd/flux2/releases/download/v${FLUX_VERSION}/flux_${FLUX_VERSION}_linux_amd64.tar.gz" \
        | tar xz -C /usr/local/bin
    - npm ci --ignore-scripts
  script:
    - npx tsx --test tests/validate.ts
  rules:
    - if: $CI_MERGE_REQUEST_IID

# ---------------------------------------------------------------------------
# Stage: security
# ---------------------------------------------------------------------------

gitleaks:
  stage: security
  image: alpine:3.21
  before_script:
    - apk add --no-cache curl
    - |
      curl -sL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
        | tar xz -C /usr/local/bin
  script:
    - gitleaks detect --source . --no-git --verbose
  rules:
    - if: $CI_MERGE_REQUEST_IID

# ---------------------------------------------------------------------------
# Stage: integration
# ---------------------------------------------------------------------------

integration-test:
  stage: integration
  image: node:22-alpine
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_CERT_PATH: "/certs/client"
    DOCKER_TLS_VERIFY: "1"
  before_script:
    - apk add --no-cache docker-cli git curl openssl bash sudo
    - npm ci --ignore-scripts
  script:
    - npx tsx --test tests/integration.ts
  after_script:
    - |
      git push "https://oauth2:${GITLAB_PAT}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" \
        --delete "ci-test-${CI_PIPELINE_ID}" 2>/dev/null || true
  rules:
    - if: $CI_MERGE_REQUEST_IID

