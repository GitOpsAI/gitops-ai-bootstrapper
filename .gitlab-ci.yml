stages:
  - test
  - security
  - integration
  - tag
  - publish

# ---------------------------------------------------------------------------
# Stage: test  (merge requests + main)
# ---------------------------------------------------------------------------

typecheck:
  stage: test
  image: node:25-alpine@sha256:ad82ecad30371c43f4057aaa4800a8ed88f9446553a2d21323710c7b937177fc
  before_script:
    - npm ci --ignore-scripts
  script:
    - npx tsc --noEmit
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"

test-template-sync:
  stage: test
  image: node:25-alpine@sha256:ad82ecad30371c43f4057aaa4800a8ed88f9446553a2d21323710c7b937177fc
  variables:
    # Deterministic branch name in CI (avoids ambiguous remote HEAD / default-branch quirks)
    GIT_TEST_BRANCH: "ci-$CI_PIPELINE_ID"
  before_script:
    - apk add --no-cache git
    - git config --global user.email "ci@test.local"
    - git config --global user.name "CI"
    - npm ci --ignore-scripts
  script:
    # tsx --test avoids test-runner IPC errors seen with node --import tsx --test
    - npm run test:sync
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"

# ---------------------------------------------------------------------------
# Stage: security  (merge requests + main)
# ---------------------------------------------------------------------------

npm-audit:
  stage: security
  image: node:25-alpine@sha256:ad82ecad30371c43f4057aaa4800a8ed88f9446553a2d21323710c7b937177fc
  script:
    - npm ci --ignore-scripts
    - npm audit --omit=dev --audit-level=high
  allow_failure: false
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"

sast-semgrep:
  stage: security
  image: semgrep/semgrep:1.157.0@sha256:17d89ddd91a7729bbd5de09402f7f79a70204289e2a94635086e9db532a495f2
  script:
    - >-
      semgrep scan
      --config p/typescript
      --config p/nodejs
      --config p/owasp-top-ten
      --config p/command-injection
      --error --json --output semgrep-report.json
      src/
  artifacts:
    paths:
      - semgrep-report.json
    when: always
    expire_in: 30 days
  allow_failure: false
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"

trivy-scan:
  stage: security
  image:
    name: aquasec/trivy:0.69.3@sha256:bcc376de8d77cfe086a917230e818dc9f8528e3c852f7b1aff648949b6258d1c
    entrypoint: [""]
  script:
    - trivy fs --severity HIGH,CRITICAL --exit-code 1 --format json --output trivy-report.json .
    - trivy fs --scanners secret --exit-code 1 .
  artifacts:
    paths:
      - trivy-report.json
    when: always
    expire_in: 30 days
  allow_failure: false
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"

# ---------------------------------------------------------------------------
# Stage: integration  (merge requests)
# ---------------------------------------------------------------------------

integration-test:
  stage: integration
  image: node:25-alpine@sha256:ad82ecad30371c43f4057aaa4800a8ed88f9446553a2d21323710c7b937177fc
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_CERT_PATH: "/certs/client"
    DOCKER_TLS_VERIFY: "1"
  before_script:
    - apk add --no-cache docker-cli git curl openssl bash sudo
    - npm ci --ignore-scripts
  script:
    - npx tsx --test tests/integration.test.ts
  after_script:
    - |
      git push "https://oauth2:${GITLAB_PAT}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" \
        --delete "ci-test-${CI_PIPELINE_ID}" 2>/dev/null || true
  rules:
    - if: $CI_MERGE_REQUEST_IID

# ---------------------------------------------------------------------------
# Stage: tag  (auto-tag on merge to main)
# ---------------------------------------------------------------------------

create-tag:
  stage: tag
  image: alpine:3.23.3@sha256:25109184c71bdad752c8312a8623239686a9a2071e8825f20acb8f2198c3f659
  before_script:
    - apk add --no-cache git curl jq
  script:
    - git fetch --tags
    - |
      SOURCE_BRANCH=$(curl -sf \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/commits/${CI_COMMIT_SHA}/merge_requests" \
        -H "PRIVATE-TOKEN: ${GITLAB_PAT}" | jq -r '.[0].source_branch // empty')

      echo "Source branch: ${SOURCE_BRANCH:-unknown}"

        case "$SOURCE_BRANCH" in
        major|major/*|breaking|breaking/*) BUMP="major" ;;
        next|next/*|feature/*)   BUMP="minor" ;;
        bugfix|bugfix/*|fix|fix/*|hotfix|hotfix/*) BUMP="patch" ;;
        *)                  BUMP="skip" ;;
      esac

      echo "Version bump: ${BUMP}"

      if [ "$BUMP" = "skip" ]; then
        echo "Branch '${SOURCE_BRANCH:-unknown}' does not match a known naming pattern – skipping tag creation."
        exit 0
      fi

      LATEST=$(git tag -l '[0-9]*' --sort=-v:refname | head -1)
      if [ -z "$LATEST" ]; then
        VERSION="1.0.0"
      else
        MAJOR=$(echo "$LATEST" | cut -d. -f1)
        MINOR=$(echo "$LATEST" | cut -d. -f2)
        PATCH=$(echo "$LATEST" | cut -d. -f3)
        case "$BUMP" in
          major) VERSION="$((MAJOR + 1)).0.0" ;;
          minor) VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
          patch) VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
        esac
      fi
    - echo "Tagging ${VERSION}"
    - git tag "${VERSION}"
    - git push "https://oauth2:${GITLAB_PAT}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "${VERSION}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ---------------------------------------------------------------------------
# Stage: publish  (npm publish on tag)
# ---------------------------------------------------------------------------

publish-npm:
  stage: publish
  image: node:25-alpine@sha256:ad82ecad30371c43f4057aaa4800a8ed88f9446553a2d21323710c7b937177fc
  before_script:
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - npm ci --ignore-scripts
  script:
    - npm version "$CI_COMMIT_TAG" --no-git-tag-version --allow-same-version
    - npm run build
    - npm publish --access public
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/