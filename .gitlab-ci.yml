stages:
  - integration

variables:
  FLUX_VERSION: "2.8.1"

# ---------------------------------------------------------------------------
# Stage: integration
# ---------------------------------------------------------------------------

integration-test:
  stage: integration
  image: node:22-alpine
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_CERT_PATH: "/certs/client"
    DOCKER_TLS_VERIFY: "1"
  before_script:
    - apk add --no-cache docker-cli git curl openssl bash sudo
    - npm ci --ignore-scripts
  script:
    - npx tsx --test tests/integration.ts
  after_script:
    - |
      git push "https://oauth2:${GITLAB_PAT}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" \
        --delete "ci-test-${CI_PIPELINE_ID}" 2>/dev/null || true
  rules:
    - if: $CI_MERGE_REQUEST_IID

