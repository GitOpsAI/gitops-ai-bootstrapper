stages:
  - security
  - integration
  - tag
  - publish

variables:
  FLUX_VERSION: "2.8.1"

# ---------------------------------------------------------------------------
# Stage: security  (merge requests + main)
# ---------------------------------------------------------------------------

npm-audit:
  stage: security
  image: node:22-alpine
  script:
    - npm ci --ignore-scripts
    - npm audit --omit=dev --audit-level=high
  allow_failure: false
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"

sast-semgrep:
  stage: security
  image: semgrep/semgrep:latest
  script:
    - >-
      semgrep scan
      --config p/typescript
      --config p/nodejs
      --config p/owasp-top-ten
      --config p/command-injection
      --error --json --output semgrep-report.json
      src/
  artifacts:
    paths:
      - semgrep-report.json
    when: always
    expire_in: 30 days
  allow_failure: false
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"

trivy-scan:
  stage: security
  image: aquasec/trivy:0.69.3@sha256:bcc376de8d77cfe086a917230e818dc9f8528e3c852f7b1aff648949b6258d1c

  script:
    - trivy fs --severity HIGH,CRITICAL --exit-code 1 --format json --output trivy-report.json .
    - trivy fs --scanners secret --exit-code 1 .
  artifacts:
    paths:
      - trivy-report.json
    when: always
    expire_in: 30 days
  allow_failure: false
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"

# ---------------------------------------------------------------------------
# Stage: integration  (merge requests)
# ---------------------------------------------------------------------------

integration-test:
  stage: integration
  image: node:22-alpine
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_CERT_PATH: "/certs/client"
    DOCKER_TLS_VERIFY: "1"
  before_script:
    - apk add --no-cache docker-cli git curl openssl bash sudo
    - npm ci --ignore-scripts
  script:
    - npx tsx --test tests/integration.ts
  after_script:
    - |
      git push "https://oauth2:${GITLAB_PAT}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" \
        --delete "ci-test-${CI_PIPELINE_ID}" 2>/dev/null || true
  rules:
    - if: $CI_MERGE_REQUEST_IID

# ---------------------------------------------------------------------------
# Stage: tag  (auto-tag on merge to main)
# ---------------------------------------------------------------------------

create-tag:
  stage: tag
  image: alpine:3.23
  before_script:
    - apk add --no-cache git
  script:
    - git fetch --tags
    - |
      LATEST=$(git tag -l '[0-9]*' --sort=-v:refname | head -1)
      if [ -z "$LATEST" ]; then
        VERSION="1.0.0"
      else
        MAJOR=$(echo "$LATEST" | cut -d. -f1)
        MINOR=$(echo "$LATEST" | cut -d. -f2)
        PATCH=$(echo "$LATEST" | cut -d. -f3)
        VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
      fi
    - echo "Tagging ${VERSION}"
    - git tag "${VERSION}"
    - git push "https://oauth2:${GITLAB_PAT}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "${VERSION}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ---------------------------------------------------------------------------
# Stage: publish  (npm publish on tag)
# ---------------------------------------------------------------------------

publish-npm:
  stage: publish
  image: node:22-alpine
  before_script:
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - npm ci --ignore-scripts
  script:
    - npm version "$CI_COMMIT_TAG" --no-git-tag-version --allow-same-version
    - npm run build
    - npm publish --access public
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/

